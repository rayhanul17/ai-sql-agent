# ============================================================
#  AI SQL Agent — ALL-IN-ONE stack (final test / production).
#  Runs PostgreSQL + Ollama (+ model) + the APP, all in containers.
#  One command:  docker compose -f docker-compose.full.yml up --build
#  Then open http://localhost:8080
#
#  Config is overridden via env vars so the app reaches the DB and
#  Ollama by their SERVICE NAMES (postgres / ollama), not localhost.
#  Note: the model must fit in RAM — 3b is the safe default here.
# ============================================================

services:
  postgres:
    image: postgres:16
    container_name: agent-postgres
    environment:
      POSTGRES_DB: agentdb
      POSTGRES_USER: agent_owner
      POSTGRES_PASSWORD: owner_pass
    ports:
      # Optional host access; 5433 avoids the local 5432 already in use.
      # The app container reaches postgres by service name on 5432 regardless.
      - "5433:5432"
    volumes:
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
      - agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_owner -d agentdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: agent-ollama
    volumes:
      - agent_ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Pulls BOTH model tiers into the ollama volume, then exits.
  ollama-init:
    image: ollama/ollama:latest
    container_name: agent-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      sh -c "ollama pull qwen2.5-coder:3b && ollama pull qwen2.5-coder:7b"
    restart: "no"

  app:
    build:
      context: .
      dockerfile: src/SqlAgent.Web/Dockerfile
    container_name: agent-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Point the app at the compose service names.
      Ollama__BaseUrl: "http://ollama:11434"
      Agent__DefaultConnectionString: "Host=postgres;Port=5432;Database=agentdb;Username=agent_readonly;Password=readonly_pass"

volumes:
  agent_pgdata:
  agent_ollama:
